<div class="page-container admin-skills-page">
    <div class="page-header">
        <div class="page-header-content">
            <h1 class="page-title">Skills &amp; Categories</h1>
            <p class="page-subtitle">Manage skills and skill categories used across the platform</p>
        </div>
    </div>
    <div class="page-body">
        <div id="admin-skills-loading" class="loading-state" style="display: none;">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
        <div id="admin-skills-content" class="space-y-6">
            <div class="card">
                <div class="card-header flex items-center justify-between">
                    <h2>Skills</h2>
                    <div class="flex gap-2">
                        <input type="text" id="admin-skill-new" class="form-input w-64" placeholder="New skill name">
                        <button type="button" id="admin-skill-add" class="btn btn-primary">Add</button>
                    </div>
                </div>
                <div class="card-body">
                    <p class="text-sm text-gray-600 mb-3">Skills are used in profiles and opportunities. Changes are stored in browser and override the default list until cleared.</p>
                    <div id="admin-skills-list" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header flex items-center justify-between">
                    <h2>Skill Categories</h2>
                    <div class="flex gap-2">
                        <input type="text" id="admin-category-new" class="form-input w-64" placeholder="New category name">
                        <button type="button" id="admin-category-add" class="btn btn-primary">Add</button>
                    </div>
                </div>
                <div class="card-body">
                    <p class="text-sm text-gray-600 mb-3">Categories group skills in dropdowns and matching.</p>
                    <div id="admin-categories-list" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
            <div class="flex gap-2">
                <button type="button" id="admin-skills-save" class="btn btn-primary">Save changes</button>
                <button type="button" id="admin-skills-reset" class="btn btn-secondary">Reset to default (clear override)</button>
            </div>
        </div>
    </div>
</div>
