<div class="page-container forgot-password-page min-h-[calc(100vh-16rem)] flex items-center justify-center p-8">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-lg p-8 shadow-lg">
            <h1 class="text-2xl font-bold text-center text-gray-900 mb-2">Reset password</h1>
            <p class="text-center text-gray-600 mb-6">Enter your email and we’ll help you reset your password.</p>
            
            <form id="forgot-password-form">
                <div class="mb-6">
                    <label for="forgot-email" class="block mb-2 font-medium text-gray-900">Email</label>
                    <input type="email" id="forgot-email" name="email" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required placeholder="your@email.com">
                </div>
                <div id="forgot-error" class="alert alert-error mb-4" style="display: none;"></div>
                <div id="forgot-success" class="alert alert-success mb-4" style="display: none;"></div>
                <div id="forgot-poc-link" class="mb-4 p-3 bg-gray-100 rounded text-sm break-all" style="display: none;"></div>
                <button type="submit" class="w-full px-6 py-3 bg-primary text-white font-medium rounded-md hover:bg-primary-dark">Send reset link</button>
            </form>
            
            <p class="text-center mt-6 text-gray-600">
                <a href="#" data-route="/login" class="text-primary font-medium hover:underline">Back to login</a>
            </p>
        </div>
    </div>
</div>
