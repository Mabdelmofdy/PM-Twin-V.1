<div class="page-container settings-page">
    <div class="page-header">
        <div class="page-header-content">
            <h1 class="page-title">Settings</h1>
            <p class="page-subtitle">Manage your account and preferences</p>
        </div>
    </div>
    <div class="page-body">

    <div class="card mb-4">
        <div class="card-header">
            <h2>Account &amp; security</h2>
        </div>
        <div class="card-body">
            <div class="form-group">
                <label class="form-label">Email verification</label>
                <p class="text-sm text-gray-600">Verify your email address to secure your account. <span class="text-muted">(Coming soon)</span></p>
                <button type="button" class="btn btn-secondary btn-sm mt-1" disabled title="Email verification will be available in a future release">Verify email</button>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <h2>Preferences</h2>
        </div>
        <div class="card-body">
            <div class="form-group">
                <label class="form-label" for="settings-language">Language</label>
                <select id="settings-language" class="form-select">
                    <option value="en">English</option>
                    <option value="ar">العربية (Arabic)</option>
                </select>
                <p class="text-sm text-gray-600 mt-1">Choose your preferred language for the interface.</p>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <h2>Notifications</h2>
        </div>
        <div class="card-body">
            <div class="form-group">
                <label class="form-label">Email notifications</label>
                <p class="text-sm text-gray-600">Configure how you receive alerts and updates. (Coming soon)</p>
            </div>
        </div>
    </div>
    </div>
</div>
